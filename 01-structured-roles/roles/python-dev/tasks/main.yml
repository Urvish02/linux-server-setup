---
# 1. Update apt cache and upgrade system packages
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  become: yes

- name: Upgrade all packages
  apt:
    upgrade: dist
  become: yes

# 2. Install system dependencies
- name: Install Python and build dependencies
  apt:
    name:
      - "python{{ python_version }}"
      - "python{{ python_version }}-dev"
      - "python{{ python_version }}-venv"
      - python3-pip
      - build-essential
      - libssl-dev
      - libffi-dev
      - git
      - curl
      - unzip
    state: present
  become: yes

# 3. Ensure pip is up to date
- name: Upgrade pip to latest version
  pip:
    name: pip
    state: latest
    executable: pip3
  become: yes

# 4. Install global Python dev tools
- name: Install global pip packages
  pip:
    name: "{{ pip_packages }}"
    state: latest
    executable: pip3
  become: yes

# 5. Create a dedicated dev directory
- name: Create Python projects directory
  file:
    path: /opt/python-projects
    state: directory
    mode: '0755'
    owner: "{{ ansible_user }}"
  become: yes

# 6. Create the auto-update script
- name: Deploy auto-update script
  copy:
    dest: /usr/local/bin/python-dev-update.sh
    mode: '0755'
    content: |
      #!/bin/bash
      LOG="/var/log/python-dev-update.log"
      echo "=== Python Dev Update: $(date) ===" >> $LOG
      apt-get update -y >> $LOG 2>&1
      apt-get upgrade -y python3 python3-pip >> $LOG 2>&1
      pip3 install --upgrade {{ pip_packages | join(' ') }} >> $LOG 2>&1
      echo "=== Done ===" >> $LOG
  become: yes

# 7. Set up cron job for auto-updates
- name: Schedule auto-update cron job
  cron:
    name: "Python dev environment auto-update"
    hour: "{{ auto_update_hour }}"
    minute: "{{ auto_update_minute }}"
    job: "/usr/local/bin/python-dev-update.sh"
    user: root
    state: present
  become: yes

# 8. Enable unattended-upgrades for security patches
- name: Install unattended-upgrades
  apt:
    name: unattended-upgrades
    state: present
  become: yes

- name: Enable unattended-upgrades
  copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
  become: yes
